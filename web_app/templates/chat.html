<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>对话 — SeismicX</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
:root {
  --accent:#667eea; --accent2:#764ba2;
  --grad:linear-gradient(135deg,var(--accent),var(--accent2));
  --user-bg:#667eea; --bg:#f5f7fa;
}
* { box-sizing:border-box; }
body { background:var(--bg); height:100vh; display:flex; flex-direction:column; overflow:hidden; font-size:.95rem; }
.navbar { background:#fff !important; box-shadow:0 2px 10px rgba(0,0,0,.08); z-index:100; flex-shrink:0; }
.navbar-brand span { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* Layout */
.app-body { flex:1; display:flex; overflow:hidden; }
.sidebar { width:220px; background:#fff; border-right:1px solid #eee; display:flex;
  flex-direction:column; flex-shrink:0; overflow-y:auto; }
.chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

/* Sidebar sections */
.sb-section { padding:.75rem 1rem; border-bottom:1px solid #f2f2f2; }
.sb-title { font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:#aaa; margin-bottom:.5rem; }
.sb-doc { display:flex; align-items:center; gap:.5rem; padding:.35rem .5rem;
  border-radius:8px; font-size:.82rem; cursor:pointer; transition:background .15s; }
.sb-doc:hover { background:#f5f5f5; }
.sb-doc .doc-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-doc .rm-btn { border:none; background:none; color:#ccc; font-size:.9rem; padding:0 2px;
  line-height:1; flex-shrink:0; }
.sb-doc .rm-btn:hover { color:#e53935; }
.kb-info { font-size:.78rem; color:#888; padding:.25rem .5rem; }

/* Chat messages */
.chat-messages { flex:1; overflow-y:auto; padding:1.25rem 1.5rem; }
.msg { margin-bottom:1rem; display:flex; animation:fadeIn .25s ease; }
.msg-user { justify-content:flex-end; }
.msg-assistant { justify-content:flex-start; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.bubble { max-width:72%; padding:.75rem 1rem; border-radius:16px; word-break:break-word; line-height:1.55; }
.msg-user .bubble { background:var(--user-bg); color:#fff; border-bottom-right-radius:4px; }
.msg-assistant .bubble { background:#fff; border:1px solid #e5e5e5; color:#333; border-bottom-left-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,.05); }
.bubble code { background:#f0f0f0; padding:1px 6px; border-radius:4px; font-size:.86em; font-family:'Menlo','Courier New',monospace; color:#c7254e; }
.bubble pre { background:#f6f8fa; border:1px solid #e0e0e0; border-radius:8px; padding:.75rem 1rem; overflow-x:auto; margin:.5rem 0; }
.bubble pre code { background:none; padding:0; color:inherit; font-size:.86em; }
.bubble strong { color:#5a5aed; font-weight:700; }
.bubble em { color:#555; }
.bubble ul, .bubble ol { margin:.4rem 0; padding-left:1.4rem; }
.bubble li { margin-bottom:.2rem; }
.bubble h1,.bubble h2,.bubble h3,.bubble h4,.bubble h5,.bubble h6 {
  font-weight:700; margin:.6rem 0 .3rem; line-height:1.3; color:#222;
}
.bubble h1 { font-size:1.2em; } .bubble h2 { font-size:1.1em; }
.bubble h3 { font-size:1em; } .bubble h4,.bubble h5,.bubble h6 { font-size:.95em; }
.bubble blockquote { border-left:3px solid var(--accent); margin:.5rem 0; padding:.3rem .8rem;
  background:#f8f9ff; border-radius:0 6px 6px 0; color:#555; font-style:italic; }
.bubble table { border-collapse:collapse; width:100%; margin:.5rem 0; font-size:.88em; }
.bubble th { background:#f0f2ff; font-weight:600; }
.bubble th, .bubble td { border:1px solid #dde; padding:.35rem .65rem; text-align:left; }
.bubble hr { border:none; border-top:1px solid #eee; margin:.6rem 0; }
.bubble p { margin:.3rem 0; }
.bubble a { color:var(--accent); text-decoration:underline; }
/* code block copy button */
.code-wrapper { position:relative; }
.copy-btn { position:absolute; top:.4rem; right:.4rem; border:none; background:#e0e0e0;
  border-radius:5px; font-size:.72rem; padding:2px 8px; cursor:pointer; opacity:.7; }
.copy-btn:hover { opacity:1; }
.msg-time { font-size:.72rem; color:#bbb; margin-top:.35rem; }
.msg-user .msg-time { text-align:right; }

/* KaTeX block math */
.bubble .katex-display { margin:.5rem 0; overflow-x:auto; }
.bubble .katex { font-size:1.05em; }

/* Source chips (inline references footer) */
.src-chips { display:flex; flex-wrap:wrap; gap:.3rem; margin-top:.6rem; padding-top:.5rem;
  border-top:1px solid #eee; }
.src-chip { display:inline-flex; align-items:center; gap:.25rem; font-size:.72rem;
  background:#f0f2ff; color:#3949ab; border-radius:8px; padding:.1rem .5rem;
  white-space:nowrap; max-width:220px; overflow:hidden; text-overflow:ellipsis; }
.src-chip .src-num { font-weight:700; flex-shrink:0; }

/* Think block */
.think-block { margin-bottom:.55rem; border:1.5px solid #e0e7ff; border-radius:10px; overflow:hidden; font-size:.83rem; }
.think-header { display:flex; align-items:center; gap:.45rem; padding:.35rem .75rem;
  background:linear-gradient(90deg,#f0f4ff,#f8f0ff); cursor:pointer; user-select:none;
  color:#5c35c5; font-weight:600; }
.think-header:hover { background:linear-gradient(90deg,#e8eeff,#f0e8ff); }
.think-toggle-icon { transition:transform .2s; display:inline-block; font-style:normal; }
.think-block.open .think-toggle-icon { transform:rotate(90deg); }
.think-body { display:none; padding:.55rem .85rem; background:#fafbff;
  border-top:1px solid #e0e7ff; color:#555; line-height:1.6; white-space:pre-wrap;
  word-break:break-word; max-height:380px; overflow-y:auto; font-family:inherit; }
.think-block.open .think-body { display:block; }
.think-cursor { display:inline-block; width:2px; height:1em; background:#9c6fe4;
  margin-left:1px; vertical-align:text-bottom; animation:tkcursor .8s step-end infinite; }
@keyframes tkcursor { 0%,100%{opacity:1} 50%{opacity:0} }

/* Think toggle pill */
.think-pill { display:inline-flex; align-items:center; gap:.3rem; padding:.22rem .65rem;
  border-radius:14px; font-size:.78rem; cursor:pointer; transition:all .2s; border:1.5px solid #dde;
  background:#fff; color:#555; user-select:none; }
.think-pill.active { background:#f0e8ff; border-color:#9c6fe4; color:#5c35c5; }
.think-pill .pill-dot { width:7px; height:7px; border-radius:50%; background:#ccc; transition:background .2s; }
.think-pill.active .pill-dot { background:#9c6fe4; }

/* Source badge */
.source-badge { display:inline-block; background:#f0f2ff; color:var(--accent); border-radius:10px;
  padding:.15rem .6rem; font-size:.75rem; margin:.4rem .2rem 0 0; }

/* Mode badge */
.mode-tag { display:inline-flex; align-items:center; gap:.3rem; font-size:.75rem;
  background:#e8f5e9; color:#2e7d32; border-radius:10px; padding:.15rem .6rem; margin-bottom:.3rem; }
.mode-tag.rag { background:#e8eaf6; color:#3949ab; }

/* Context bar */
.context-bar { padding:.4rem 1rem; background:#fff; border-top:1px solid #eee;
  display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; min-height:0; }
.ctx-chip { display:inline-flex; align-items:center; gap:.35rem; background:#e8eaf6;
  color:#3949ab; border-radius:12px; padding:.2rem .65rem; font-size:.8rem; }
.ctx-chip .rm { border:none; background:none; color:#9fa8da; font-size:.85rem; padding:0 1px; line-height:1; }
.ctx-chip .rm:hover { color:#e53935; }

/* Typing dots */
.typing { display:none; }
.typing.show { display:flex; }
.dot { width:7px; height:7px; border-radius:50%; background:#ccc; margin:2px 2px;
  animation:blink 1.4s infinite; }
.dot:nth-child(2) { animation-delay:.2s; }
.dot:nth-child(3) { animation-delay:.4s; }
@keyframes blink { 0%,60%,100%{transform:none} 30%{transform:translateY(-7px)} }

/* Input area */
.input-area { background:#fff; border-top:1px solid #eee; padding:.8rem 1.25rem; flex-shrink:0; }
.quick-row { display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:.6rem; }
.qbtn { border:1.5px solid #dde; background:#fff; color:#555; border-radius:20px;
  padding:.3rem .85rem; font-size:.82rem; cursor:pointer; transition:all .2s; }
.qbtn:hover { border-color:var(--accent); color:var(--accent); background:#f0f2ff; }
.qbtn.active { background:var(--grad); color:#fff; border-color:transparent; }

.input-row { display:flex; align-items:flex-end; gap:.5rem; }
.input-box { flex:1; border:1.5px solid #dde; border-radius:22px; overflow:hidden;
  display:flex; transition:border-color .2s; }
.input-box:focus-within { border-color:var(--accent); }
#userInput { border:none; padding:.65rem 1rem; font-size:.95rem; flex:1; resize:none;
  max-height:120px; overflow-y:auto; line-height:1.4; }
#userInput:focus { outline:none; box-shadow:none; }
.attach-btn, .send-btn { border:none; background:none; cursor:pointer; padding:.4rem .65rem;
  color:#aaa; font-size:1.15rem; transition:color .2s; }
.attach-btn:hover { color:var(--accent); }
.send-btn { background:var(--grad); color:#fff; border-radius:50%; width:38px; height:38px;
  display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
.send-btn:hover { opacity:.9; }

/* Welcome */
.welcome { text-align:center; padding:3rem 1rem; }
.welcome h3 { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.feat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:.8rem; margin-top:1.5rem; }
.feat-card { background:#fff; border:1.5px solid #eee; border-radius:12px; padding:1rem;
  cursor:pointer; transition:all .2s; }
.feat-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 6px 20px rgba(102,126,234,.15); }
.feat-card .icon { font-size:1.8rem; margin-bottom:.5rem; background:var(--grad);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
</style>
</head>
<body>
<!-- Nav -->
<nav class="navbar navbar-expand-lg navbar-light">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="/chat">
      <i class="bi bi-activity text-primary"></i>
      <span><strong>SeismicX</strong></span>
    </a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-1 align-items-center">
        <li class="nav-item"><a class="nav-link active fw-bold" href="/chat"><i class="bi bi-chat-dots"></i> <span data-i18n="nav_chat">对话</span></a></li>
        <li class="nav-item"><a class="nav-link" href="/evidence-geo-agent"><i class="bi bi-geo-alt-fill"></i> <span data-i18n="nav_geo">地学解译</span></a></li>
        <li class="nav-item"><a class="nav-link" href="/knowledge"><i class="bi bi-journal-bookmark-fill"></i> <span data-i18n="nav_knowledge">知识库</span></a></li>
        <li class="nav-item"><a class="nav-link" href="/skills"><i class="bi bi-lightning-charge"></i> <span data-i18n="nav_skills">技能</span></a></li>
        <li class="nav-item"><a class="nav-link" href="/llm-settings"><i class="bi bi-cpu"></i> LLM</a></li>
        <li class="nav-item">
          <button id="langToggle" onclick="toggleLang()"
            style="border:1.5px solid #dde;background:#f8f9ff;color:#555;border-radius:16px;
                   padding:.22rem .75rem;font-size:.78rem;cursor:pointer;transition:all .2s;
                   display:flex;align-items:center;gap:.3rem;">
            🌐 <span id="langLabel">EN</span>
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="app-body">
  <!-- Sidebar: uploaded docs + KB status -->
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-title"><i class="bi bi-file-earmark-pdf me-1"></i><span data-i18n="sb_uploads">本次上传</span></div>
      <div id="sessionDocList">
        <div class="kb-info text-muted" data-i18n-html="sb_no_doc">暂无上传文档<br>点击 📎 上传 PDF</div>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-title"><i class="bi bi-journal-bookmark me-1"></i><span data-i18n="sb_kb">知识库</span></div>
      <div id="kbInfo" class="kb-info" data-i18n="loading">加载中…</div>
      <a href="/knowledge" class="btn btn-sm btn-outline-secondary w-100 mt-2" style="font-size:.78rem;">
        <i class="bi bi-gear"></i> <span data-i18n="sb_manage_kb">管理知识库</span>
      </a>
    </div>
    <!-- Workspace directory -->
    <div class="sb-section">
      <div class="sb-title"><i class="bi bi-folder2-open me-1"></i><span data-i18n="sb_workspace">本地工作目录</span></div>
      <div class="d-flex align-items-center gap-1 mb-1">
        <div class="form-check form-switch mb-0" style="min-width:0">
          <input class="form-check-input" type="checkbox" id="wsEnabled" onchange="toggleWorkspace()">
          <label class="form-check-label" for="wsEnabled" style="font-size:.78rem" data-i18n="sb_ws_auth">授权访问</label>
        </div>
      </div>
      <div id="wsDirRow" style="display:none">
        <input type="text" class="form-control form-control-sm" id="wsPath"
               placeholder="/data/seismic/waveform" style="font-size:.78rem;margin-bottom:.3rem">
        <button class="btn btn-sm btn-outline-secondary w-100" style="font-size:.75rem" onclick="saveWorkspace()">
          <i class="bi bi-check2"></i> <span data-i18n="sb_save_path">保存路径</span>
        </button>
        <div id="wsStatus" class="kb-info mt-1"></div>
      </div>
    </div>
  </div>

  <!-- Main chat -->
  <div class="chat-area">
    <div class="chat-messages" id="chatMessages">
      <div class="welcome" id="welcomePanel">
        <h3><i class="bi bi-robot"></i> <span data-i18n="welcome_title">SeismicX AI 助手</span></h3>
        <p class="text-muted" data-i18n="welcome_sub">您好！我是地震学智能助手，可以回答问题、解读文献、分析数据。</p>
        <div class="feat-grid">
          <div class="feat-card" id="fc_qa" onclick="sendQuick(T('quick_qa_msg'))">
            <div class="icon"><i class="bi bi-question-circle"></i></div>
            <div class="fw-semibold" style="font-size:.88rem;" data-i18n="feat_qa">地震学问答</div>
            <div class="text-muted" style="font-size:.78rem;" data-i18n="feat_qa_sub">方法原理 / ObsPy 用法</div>
          </div>
          <div class="feat-card" onclick="triggerUpload()">
            <div class="icon"><i class="bi bi-file-earmark-pdf"></i></div>
            <div class="fw-semibold" style="font-size:.88rem;" data-i18n="feat_upload">上传文献</div>
            <div class="text-muted" style="font-size:.78rem;" data-i18n="feat_upload_sub">解读论文 / RAG 问答</div>
          </div>
          <div class="feat-card" id="fc_kb" onclick="sendQuick(T('quick_kb_msg'))">
            <div class="icon"><i class="bi bi-journal-bookmark"></i></div>
            <div class="fw-semibold" style="font-size:.88rem;" data-i18n="feat_kb">知识库查询</div>
            <div class="text-muted" style="font-size:.78rem;" data-i18n="feat_kb_sub">基于已索引文献检索</div>
          </div>
          <div class="feat-card" id="fc_code" onclick="sendQuick(T('quick_code_msg'))">
            <div class="icon"><i class="bi bi-code-slash"></i></div>
            <div class="fw-semibold" style="font-size:.88rem;" data-i18n="feat_code">数据处理</div>
            <div class="text-muted" style="font-size:.78rem;" data-i18n="feat_code_sub">生成 Python 代码并执行</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Typing indicator (inside chat area) -->
    <div style="padding:0 1.5rem .25rem">
      <div class="typing" id="typingIndicator">
        <div class="bubble" style="background:#fff;border:1px solid #e5e5e5;padding:.5rem .75rem;border-radius:14px;border-bottom-left-radius:4px;">
          <div style="display:flex;align-items:center;gap:.5rem;">
            <div style="display:flex;gap:2px;">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
            <span id="typingText" style="font-size:.85rem;color:#666;" data-i18n="typing_thinking">正在思考中...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Context bar -->
    <div class="context-bar" id="contextBar" style="display:none">
      <span style="font-size:.78rem;color:#888;" data-i18n="ctx_ref">引用上下文：</span>
      <div id="contextChips"></div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="quick-row">
        <button class="qbtn" id="qbtn_filter" onclick="sendQuick(T('qbtn_filter_msg'))">💡 <span data-i18n="qbtn_filter">滤波方法</span></button>
        <button class="qbtn" id="qbtn_summary" onclick="sendQuick(T('qbtn_summary_msg'))">📖 <span data-i18n="qbtn_summary">总结文献</span></button>
        <button class="qbtn" id="qbtn_formula" onclick="sendQuick(T('qbtn_formula_msg'))">🔢 <span data-i18n="qbtn_formula">解读公式</span></button>
        <button class="qbtn" id="qbtn_pick" onclick="sendQuick(T('qbtn_pick_msg'))">🔍 <span data-i18n="qbtn_pick">拾取震相</span></button>
        <div class="think-pill" id="thinkPill" onclick="toggleThink()" title="启用思考模式：模型会先推理再回答" style="margin-left:auto">
          <span class="pill-dot"></span>
          <span id="thinkPillLabel">🧠 <span data-i18n="think_off">思考：关</span></span>
        </div>
        <button class="qbtn" onclick="clearChat()">🗑 <span data-i18n="qbtn_clear">清空</span></button>
      </div>
      <div class="input-row">
        <div class="input-box">
          <button class="attach-btn" data-i18n-title="attach_title" title="上传 PDF" onclick="triggerUpload()">
            <i class="bi bi-paperclip"></i>
          </button>
          <textarea id="userInput" rows="1" data-i18n-placeholder="input_placeholder" placeholder="输入问题或指令…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" onclick="sendMessage()"><i class="bi bi-send-fill"></i></button>
      </div>
    </div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".pdf" multiple style="display:none" onchange="uploadFiles(this.files)">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>

<script>
const I18N = {

    feat_upload: '上传文献', feat_upload_sub: '解读论文 / RAG 问答',
    feat_kb: '知识库查询', feat_kb_sub: '基于已索引文献检索',

    qbtn_filter: '滤波方法', qbtn_summary: '总结文献',
    qbtn_formula: '解读公式', qbtn_pick: '拾取震相', qbtn_clear: '清空',
    attach_title: '上传 PDF', input_placeholder: '输入问题或指令…',
    // Quick action messages
    quick_qa_msg: '如何获取 IRIS 波形数据？',
    quick_kb_msg: '知识库里有哪些内容？',
    quick_code_msg: '帮我对 /data/wave.mseed 做带通滤波并画图',
    qbtn_filter_msg: '如何做带通滤波？',
    qbtn_summary_msg: '请总结这篇文献的核心方法和贡献',
    qbtn_formula_msg: '文献中的关键公式是什么？请解释',
    qbtn_pick_msg: '帮我拾取震相',
    // Status / result labels
    skill_label: '技能', exec_ok: '✅ 代码执行成功', exec_fail: '❌ 执行失败',
    gen_code_label: '生成的代码：', dl_image: '⬇ 图像', dl_script: '⬇ GMT脚本',
    ctx_ref: '引用上下文：',

// ── Markdown + Math rendering ─────────────────────────────────────────────

function _hlCode(code, lang) {
  if (typeof hljs === 'undefined') return String(code).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if (lang && hljs.getLanguage(lang)) {
    try { return hljs.highlight(code, {language: lang}).value; } catch(e) {}
  }
  try { return hljs.highlightAuto(code).value; } catch(e) {}
  return String(code).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

(function _setupMarked() {
  if (typeof marked === 'undefined') return;
  const r = new marked.Renderer();
  r.code = function(code, lang) {
    const hl  = _hlCode(code, lang || '');
    const lbl = lang
      ? `<span style="font-size:.7rem;color:#888;text-transform:lowercase;margin-right:.35rem">${lang}</span>`
      : '';
    return [
      '<div class="code-wrapper">',
      `  <pre><code class="hljs">${hl}</code></pre>`,
      `  <div style="display:flex;align-items:center;justify-content:flex-end;`,
      `              padding:.15rem .5rem .3rem;gap:.3rem;border-top:1px solid #e8e8e8;">`,
      `    ${lbl}<button class="copy-btn" onclick="copyCode(this)">Copy</button>`,
      '  </div>',
      '</div>'
    ].join('\n');
  };
  r.codespan = function(code) { return `<code>${code}</code>`; };
  marked.use({ renderer: r, breaks: true, gfm: true });
})();

// ── Math pre-processing ──────────────────────────────────────────────────────
// Normalise various LLM math-delimiter styles to $$…$$ / $…$ before
// feeding into marked, so KaTeX can render them.
function _preprocessMath(text) {
  // 1. LLM "bracket block" style:   [\n  formula  \n]   on their own lines
  text = text.replace(/^(\[)\s*\n([\s\S]*?)\n\s*(\])\s*$/gm, (m, _o, inner) => {
    if (/[\\^_{}]/.test(inner) || /\b(?:log|sin|cos|frac|sum|int|lim|sqrt|bar|hat)\b/.test(inner))
      return '$$\n' + inner.trim() + '\n$$';
    return m;
  });
  // 2. LaTeX \[ … \]  and \( … \)
  text = text.replace(/\\\[([\s\S]*?)\\\]/g, (_m, c) => '$$\n' + c.trim() + '\n$$');
  text = text.replace(/\\\(([\s\S]*?)\\\)/g, (_m, c) => '$' + c.trim() + '$');
  return text;
}

// ── Bold normalisation ────────────────────────────────────────────────────────
// Marked won't bold "** word**" (space after opening **). Normalise it.
function _normaliseBold(text) {
  return text
    .replace(/\*\* +([^*\n]+?)\*\*/g, '**$1**')   // ** word** → **word**
    .replace(/\*\*([^*\n]+?) +\*\*/g, '**$1**');   // **word ** → **word**
}

// ── KaTeX render helper ───────────────────────────────────────────────────────
function _renderMath(expr, display) {
  if (typeof katex === 'undefined') return display ? `<pre><code>${expr}</code></pre>` : `<code>${expr}</code>`;
  try {
    return katex.renderToString(expr, {
      displayMode:  display,
      throwOnError: false,
      trust:        false,
    });
  } catch(e) {
    return display ? `<pre><code>${expr}</code></pre>` : `<code>${expr}</code>`;
  }
}

function formatText(text) {
  if (!text) return '';

  // Step 1: normalise LLM bold + math delimiters
  text = _normaliseBold(_preprocessMath(String(text)));

  // Step 2: extract and protect math regions (prevents marked from mangling them)
  const mathStore = [];
  // Block math  $$…$$
  text = text.replace(/\$\$([\s\S]*?)\$\$/g, (_m, expr) => {
    mathStore.push({ expr: expr.trim(), display: true });
    return `\x02MATH${mathStore.length - 1}\x03`;
  });
  // Inline math  $…$  (single $, non-empty, no newline inside)
  text = text.replace(/\$([^$\n]{1,300}?)\$/g, (_m, expr) => {
    mathStore.push({ expr: expr.trim(), display: false });
    return `\x02MATH${mathStore.length - 1}\x03`;
  });

  // Step 3: markdown → HTML
  let html;
  if (typeof marked === 'undefined') {
    html = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  } else {
    try { html = marked.parse(text); }
    catch(e) {
      html = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }
  }

  // Step 4: restore math, rendered by KaTeX
  html = html.replace(/\x02MATH(\d+)\x03/g, (_m, idx) => {
    const { expr, display } = mathStore[+idx];
    return _renderMath(expr, display);
  });

  return html;
}

// ── Source chips renderer ─────────────────────────────────────────────────────
// Returns an HTML string: small coloured pills for each source, NO separate heading.
function _renderSourceChips(sources) {
  if (!sources || !sources.length) return '';
  const chips = sources.map((s, i) =>
    `<span class="src-chip"><span class="src-num">[${i+1}]</span>${_esc(s)}</span>`
  ).join('');
  return `<div class="src-chips">${chips}</div>`;
}
function _esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCode(btn) {
  const code = btn.closest('.code-wrapper').querySelector('code');
  navigator.clipboard.writeText(code.innerText).then(() => {
    const prev = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = prev, 1800);
  }).catch(() => {
    // fallback for browsers without clipboard API
    const range = document.createRange();
    range.selectNodeContents(code);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = 'Copy', 1800);
  });
}

// ── LLM 路由判断 ───────────────────────────────────────────────────────────
async function classifyIntent(text) {
  const t = text.trim();
  const endsQ    = /[?？]\s*$/.test(t);
  const hasPath  = /(?:^|[\s\u4e00-\u9fff，。：、])[/~][\w./\-]{4,}/.test(t);
  const actionRe = /帮我|请帮|帮忙|执行|运行|处理一下|做一下|跑一下|跑下|计算一下|绘制一下|画一下|下载一下/;
  const questionStartRe = /^(如何|怎么|怎样|什么是|什么叫|为什么|为何|哪种|哪些|请解释|能解释|介绍|介绍一下|讲一下|讲讲|请问|有没有什么|有何区别|原理|有什么区别|what is|what are|how to|how does|why |explain|tell me about)/i;

  // 快速路径 A：有绝对路径 且 无问号 → code
  if (hasPath && !endsQ) return 'code';

  // 快速路径 A2：上轮是代码，且含"改进/调整"等关键词 → 直接路由 code（不用问 LLM）
  const improvementRe = /^(改|修改|调整|改成|改为|换成|换个|改一下|调大|调小|放大|缩小|加上|加入|加个|删掉|删除|去掉|优化|美化|换颜色|标注|标记|重新|再画|再试|再来|继续|在此基础上|基于上面|在上面|在刚才)/;
  if (lastIntentWasCode && improvementRe.test(t) && !endsQ) return 'code';

  // 快速路径 A3：有文献上下文，且要求复现/实现 → chain（先 RAG 提取方法，再 Code 生成）
  const reproducingRe = /复现|实现一下|用.{0,5}实现|帮我写|帮我实现|编程实现|代码实现|写代码|写个程序|写出来|用Python|用代码|reproduce|implement|code it|write.*code/i;
  if ((sessionDocs.length > 0 || lastIntentWasPaper) && reproducingRe.test(t) && !endsQ) return 'chain';

  // 其余情况：交给后端 LLM 判断（传入最近对话历史帮助消歧）
  try {
    const r = await fetch('/api/chat/route', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message:     text,
        kb_has_docs: kbHasDocs || sessionDocs.length > 0,
        history:     chatHistory.slice(-6),   // 最近 3 轮
      }),
    });
    const d = await r.json();
    return d.intent || 'qa';
  } catch (e) {
    // 网络失败时保守回退：有操作动词才 code，否则 qa
    if (actionRe.test(t) || /绘制|画图|滤波|频谱|读取|执行|运行|\.sac|\.mseed/i.test(t)) return 'code';
    return 'qa';
  }
}

// ── Send message ───────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text) return;

  addMsg('user', text);
  chatHistory.push({role:'user', content:text});
  input.value = '';
  autoResize(input);
  // 清除上一轮的"继续改进"提示卡
  document.querySelectorAll('.improve-hint-row').forEach(el => el.remove());
  showTyping(T('typing_routing'));  // 正在分析意图...

  try {
    // 用 LLM 判断意图（code / qa / chat）
    const intent = await classifyIntent(text);

    if (intent === 'chain') {
      // ── 串联模式：论文解读 → 编程 Agent ──────────────────────────────
      await sendChainRagCode(text);
    } else if (intent === 'code') {
      lastIntentWasPaper = false;
      showTyping(T('typing_code'));  // 正在生成代码...
      await sendCode(text);                              // 生成并执行技能代码
      // lastIntentWasCode is set inside sendCode on success
    } else if (intent === 'qa' || sessionDocs.length > 0 || kbHasDocs) {
      lastIntentWasCode = false;     // 切换到问答模式，清除改进标记
      showTyping(T('typing_rag'));  // 正在检索知识...
      await sendRag(text);                               // 知识问答 + RAG 检索
    } else {
      lastIntentWasCode  = false;    // 切换到普通对话，清除改进标记
      lastIntentWasPaper = false;
      showTyping(T('typing_chat'));  // 正在对话中...
      await sendNormal(text);                            // 普通对话
    }
  } catch(e) {
    hideTyping();
    addMsg('assistant', `✗ Request failed: ${e.message}`);
  }
}

// ── Polling helper for async code jobs ────────────────────────────────────
async function pollCodeJob(jobId) {
  // Progress message labels (cycling through them looks alive)
  const codeLabel = T('typing_code');
  const progressLabels = {
    analyzing:  codeLabel + ' — ' + (currentLang==='zh' ? '分析文件…' : 'Analyzing files…'),
    planning:   codeLabel + ' — ' + (currentLang==='zh' ? '规划步骤…' : 'Planning…'),
    generating: codeLabel + ' — ' + (currentLang==='zh' ? '生成代码…' : 'Generating…'),
    executing:  codeLabel + ' — ' + (currentLang==='zh' ? '执行中…'   : 'Executing…'),
    debugging:  codeLabel + ' — ' + (currentLang==='zh' ? '调试修复…' : 'Debugging…'),
    verifying:  codeLabel + ' — ' + (currentLang==='zh' ? '验证结果…' : 'Verifying…'),
    done:       codeLabel + ' — ' + (currentLang==='zh' ? '完成'       : 'Done'),
  };

  let lastShown = '';
  const POLL_MS = 1000;

  while (true) {
    await new Promise(res => setTimeout(res, POLL_MS));
    let poll;
    try {
      const pr = await fetch(`/api/chat/code/poll/${jobId}`);
      poll = await pr.json();
    } catch(e) {
      // Network hiccup — keep retrying
      continue;
    }

    // Update typing indicator with latest progress message
    const progList = poll.progress || [];
    if (progList.length > 0) {
      const latest = progList[progList.length - 1];
      const label = progressLabels[latest] || (T('typing_code') + ' (' + latest + ')');
      if (label !== lastShown) {
        showTyping(label);
        lastShown = label;
      }
    }

    if (poll.status === 'done') {
      return poll.result || {ok: false, error: 'No result returned'};
    }
    if (poll.status === 'error') {
      return {ok: false, error: poll.error || 'Job failed'};
    }
    // status === 'running' → keep polling
  }
}

// ── CodeEngine 技能执行 ────────────────────────────────────────────────────
// phase2Badge: 若为 true，在结果气泡顶部显示"步骤 2 — 代码实现"标签（链式调用时使用）
async function sendCode(text, phase2Badge = false) {
  // ── 从当前消息或历史中提取数据路径 ────────────────────────────────────
  // 1. 从用户当前消息提取路径（如 "看下目录/data/seismic/waveform"）
  const pathInMsg = text.match(/([~\/][\w.\-/]{4,})/);
  if (pathInMsg) lastDataPath = pathInMsg[1];

  // ── 对绘图请求注入数据目录上下文 ───────────────────────────────────────
  let enrichedText = text;
  const isPlotReq = /(绘制|画图|画波形|绘图|可视化|plot)/i.test(text);
  if (isPlotReq && lastDataPath) {
    enrichedText += `\n（数据目录：${lastDataPath}，请直接用 read_stream_from_dir 读取并绘图，不要列目录，不要使用临时目录）`;
  }

  // ── Async job: POST → get job_id → poll until done ────────────────────
  let startData;
  try {
    const r = await fetch('/api/chat/code', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: enrichedText, session_id: SESSION_ID}),
    });
    startData = await r.json();
  } catch(e) {
    hideTyping();
    addMsg('assistant', `✗ ${T('skill_label')} error: ${e.message}`);
    return;
  }

  if (!startData.ok) {
    hideTyping();
    addMsg('assistant', `✗ ${T('skill_label')} error: ${startData.error}`);
    return;
  }

  // Poll the job until it's done
  const jobId = startData.job_id;
  const d = await pollCodeJob(jobId);

  hideTyping();

  if (!d.ok) {
    addMsg('assistant', `✗ ${T('skill_label')} error: ${d.error}`);
    return;
  }

  // ── 直接构建 DOM，完全避免 markdown 解析问题 ──────────────────────────
  const welcome = document.getElementById('welcomePanel');
  if (welcome) welcome.remove();

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg msg-assistant';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.maxWidth = '82%';

  // -1. Chain phase badge（串联调用时显示"步骤 2 — 代码实现"）
  if (phase2Badge) {
    const badgeEl = document.createElement('div');
    badgeEl.style.cssText = 'display:inline-block;font-size:.72rem;padding:.08rem .5rem;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;color:#2e7d32;margin-bottom:.5rem;';
    badgeEl.textContent = currentLang === 'zh' ? '⚙ 步骤 2 — 代码实现' : '⚙ Step 2 — Code Implementation';
    bubble.appendChild(badgeEl);
  }

  // 0. Plan banner (shown above everything else)
  if (d.plan && d.plan.length > 0) {
    const planWrap = document.createElement('div');
    planWrap.style.cssText = 'background:#f0f4ff;border:1px solid #c5cae9;border-radius:8px;padding:.45rem .8rem;margin-bottom:.6rem;font-size:.8rem;';
    const planTitle = document.createElement('div');
    planTitle.style.cssText = 'color:#3949ab;font-weight:700;margin-bottom:.3rem;';
    planTitle.textContent = '📋 Plan';
    planWrap.appendChild(planTitle);
    d.plan.forEach((step, i) => {
      const s = document.createElement('div');
      s.style.cssText = 'color:#555;margin:.1rem 0;';
      s.textContent = `${i + 1}. ${step}`;
      planWrap.appendChild(s);
    });
    bubble.appendChild(planWrap);
  }

  // 1. 技能标签 / Skill badge
  if (d.skill_used) {
    const tag = document.createElement('div');
    tag.style.cssText = 'font-size:.78rem;color:#3949ab;font-weight:600;margin-bottom:.5rem;';
    tag.innerHTML = `🔧 ${T('skill_label')}：<code style="background:#e8eaf6;padding:1px 6px;border-radius:4px;font-size:.85em">${d.skill_used}</code>`;
    bubble.appendChild(tag);
  }

  // 2. 执行状态
  const status = document.createElement('div');
  status.style.cssText = 'font-weight:600;margin-bottom:.4rem;color:' + (d.success ? '#2e7d32' : '#c62828') + ';';
  const attempts = d.attempts || 1;
  if (d.success && attempts > 1) {
    status.textContent = T('exec_ok') + ` (auto-fixed in ${attempts} attempt${attempts > 1 ? 's' : ''})`;
    status.style.color = '#1565c0';
  } else {
    status.textContent = d.success ? T('exec_ok') : T('exec_fail');
  }
  bubble.appendChild(status);

  // 2a. 失败时显示错误详情（从 d.response 提取 Last error: 段落）
  if (!d.success && d.response) {
    // 提取 "Last error:" 之后的部分，如果没有则显示完整 response（去掉首行）
    let errDetail = '';
    const lastErrIdx = d.response.indexOf('Last error:');
    if (lastErrIdx !== -1) {
      errDetail = d.response.slice(lastErrIdx + 'Last error:'.length).trim();
    } else {
      // 去掉 "✗ Execution failed..." 首行，显示其余内容
      const lines = d.response.split('\n');
      errDetail = lines.slice(1).join('\n').trim();
    }
    if (errDetail) {
      const errBox = document.createElement('pre');
      errBox.style.cssText = 'background:#fff8f8;border:1px solid #fcc;border-radius:6px;padding:.5rem .75rem;margin:.3rem 0 .5rem;font-size:.8em;overflow-x:auto;white-space:pre-wrap;word-break:break-all;color:#b71c1c;max-height:200px;overflow-y:auto;';
      errBox.textContent = errDetail;
      bubble.appendChild(errBox);
    }
  }

  // 2b. Debug trace (失败时自动展开，成功时折叠)
  if (d.debug_trace && d.debug_trace.length > 0) {
    const traceWrap = document.createElement('details');
    traceWrap.style.cssText = 'margin:.4rem 0 .6rem;font-size:.8rem;border:1px solid #e0e7ff;border-radius:8px;overflow:hidden;';
    // 执行失败时自动展开，方便用户直接看到调试过程
    if (!d.success) traceWrap.open = true;

    const traceSummary = document.createElement('summary');
    traceSummary.style.cssText = 'padding:.35rem .75rem;background:#f0f4ff;cursor:pointer;color:#3949ab;font-weight:600;list-style:none;display:flex;align-items:center;gap:.4rem;';
    const roundCount = attempts - 1;
    traceSummary.innerHTML = `🔄 ${roundCount} debug round${roundCount !== 1 ? 's' : ''} — ${d.success ? 'click to inspect' : 'auto-debug log'}`;
    traceWrap.appendChild(traceSummary);

    d.debug_trace.forEach(t => {
      const row = document.createElement('div');
      row.style.cssText = 'padding:.4rem .75rem;border-top:1px solid #e8eaf6;';
      const icon = t.success ? '✓' : '✗';
      const col  = t.success ? '#2e7d32' : '#c62828';
      row.innerHTML = `<span style="font-weight:600;color:${col}">${icon} Round ${t.attempt}</span>`;
      if (t.diagnosis) {
        const diag = document.createElement('div');
        diag.style.cssText = 'color:#555;margin-top:.15rem;font-style:italic;';
        diag.textContent = t.diagnosis;
        row.appendChild(diag);
      }
      if (t.error && !t.success) {
        const errEl = document.createElement('pre');
        errEl.style.cssText = 'background:#fff8f8;border:1px solid #fcc;border-radius:4px;padding:.3rem .5rem;margin:.25rem 0 0;font-size:.76em;overflow-x:auto;white-space:pre-wrap;max-height:150px;overflow-y:auto;';
        errEl.textContent = t.error;
        row.appendChild(errEl);
      }
      traceWrap.appendChild(row);
    });

    bubble.appendChild(traceWrap);
  }

  // 3. 标准输出（只显示一次，去掉 [FIGURE] 行）
  const cleanOut = (d.stdout || '')
    .split('\n')
    .filter(l => !l.startsWith('[FIGURE]') && !l.startsWith('[GMT_SCRIPT]'))
    .join('\n').trim();
  if (cleanOut) {
    const pre = document.createElement('pre');
    pre.style.cssText = 'background:#f6f8fa;border:1px solid #e0e0e0;border-radius:8px;padding:.6rem .8rem;overflow-x:auto;font-size:.82em;margin:.3rem 0;white-space:pre-wrap;word-break:break-all;';
    pre.textContent = cleanOut;
    bubble.appendChild(pre);
  } else if (d.success && lastDataPath && !d.figures.length) {
    // stdout 为空且无图时，至少显示访问了哪个目录
    const pathNote = document.createElement('div');
    pathNote.style.cssText = 'font-size:.8rem;color:#666;margin-top:.25rem;word-break:break-all;';
    pathNote.textContent = `📁 ${lastDataPath}`;
    bubble.appendChild(pathNote);
  }

  // 4. (code is now shown via the toggle in section 6)

  // 5. 图像（内嵌 base64，直接在气泡里显示）+ 下载按钮
  if (d.figures && d.figures.length) {
    d.figures.forEach(fig => {
      // 图像容器
      const figWrap = document.createElement('div');
      figWrap.style.cssText = 'margin-top:.75rem;';

      // 图像本体
      const imgSrc = `data:image/png;base64,${fig.data}`;
      const img = document.createElement('img');
      img.src = imgSrc;
      img.alt = fig.name;
      img.style.cssText = 'max-width:100%;border-radius:8px 8px 0 0;border:1px solid #e0e0e0;border-bottom:none;display:block;cursor:zoom-in;';
      img.title = '点击放大';
      img.onclick = () => {
        const win = window.open();
        win.document.write(`<!DOCTYPE html><html><body style="margin:0;background:#111">
          <img src="${imgSrc}" style="max-width:100%;display:block;margin:auto">
          </body></html>`);
      };
      figWrap.appendChild(img);

      // 下载工具栏
      const toolbar = document.createElement('div');
      toolbar.style.cssText = 'display:flex;gap:.4rem;padding:.4rem .6rem;background:#f6f8fa;border:1px solid #e0e0e0;border-radius:0 0 8px 8px;flex-wrap:wrap;align-items:center;';

      // 文件名标签
      const fnLabel = document.createElement('span');
      fnLabel.style.cssText = 'font-size:.75rem;color:#888;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
      fnLabel.textContent = fig.name;
      toolbar.appendChild(fnLabel);

      // 下载图像按钮
      const dlImg = document.createElement('a');
      dlImg.href = imgSrc;
      dlImg.download = fig.name;
      dlImg.style.cssText = 'font-size:.75rem;padding:.18rem .55rem;border-radius:4px;background:#e8f4fd;color:#1565c0;border:1px solid #bbdefb;text-decoration:none;white-space:nowrap;cursor:pointer;';
      dlImg.textContent = T('dl_image');
      toolbar.appendChild(dlImg);

      // GMT script download button (GMT figures only)
      if (fig.gmt_script) {
        const scriptBlob = new Blob([fig.gmt_script.content], {type: 'text/plain;charset=utf-8'});
        const scriptUrl  = URL.createObjectURL(scriptBlob);
        const dlScript   = document.createElement('a');
        dlScript.href     = scriptUrl;
        dlScript.download = fig.gmt_script.name;
        dlScript.style.cssText = 'font-size:.75rem;padding:.18rem .55rem;border-radius:4px;background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;text-decoration:none;white-space:nowrap;cursor:pointer;';
        dlScript.textContent = T('dl_script');
        toolbar.appendChild(dlScript);
      }

      figWrap.appendChild(toolbar);
      bubble.appendChild(figWrap);
    });
  }

  // 6. Download script button (always shown when code was generated)
  if ((d.downloads && d.downloads.length) || d.code) {
    const dlBar = document.createElement('div');
    dlBar.style.cssText = 'display:flex;align-items:center;gap:.5rem;margin-top:.6rem;flex-wrap:wrap;';

    if (d.downloads && d.downloads.length) {
      d.downloads.forEach(file => {
        const bin = atob(file.data);
        const buf = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) {
          buf[i] = bin.charCodeAt(i);
        }
        const blob = new Blob([buf], {type: file.mimetype || 'application/octet-stream'});
        const url = URL.createObjectURL(blob);
        const dl = document.createElement('a');
        dl.href = url;
        dl.download = file.name;
        dl.style.cssText = 'font-size:.78rem;padding:.22rem .7rem;border-radius:6px;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;';
        dl.textContent = `⬇ ${file.name}`;
        dlBar.appendChild(dl);
      });
    }

    if (d.code) {
      const toggleBtn = document.createElement('button');
      toggleBtn.style.cssText = 'font-size:.78rem;padding:.22rem .7rem;border-radius:6px;background:#f5f5f5;color:#555;border:1px solid #ddd;cursor:pointer;';
      toggleBtn.textContent = '{ } View Code';
      const codeDiv = document.createElement('pre');
      codeDiv.style.cssText = 'display:none;background:#f6f8fa;border:1px solid #e0e0e0;border-radius:8px;padding:.65rem .8rem;overflow-x:auto;font-size:.8em;margin:.35rem 0 0;white-space:pre-wrap;';
      codeDiv.textContent = d.code;
      toggleBtn.onclick = () => {
        const hidden = codeDiv.style.display === 'none';
        codeDiv.style.display = hidden ? 'block' : 'none';
        toggleBtn.textContent = hidden ? '{ } Hide Code' : '{ } View Code';
      };
      dlBar.appendChild(toggleBtn);
      bubble.appendChild(dlBar);
      bubble.appendChild(codeDiv);
    } else {
      bubble.appendChild(dlBar);
    }
  }

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});

  msgDiv.appendChild(bubble);
  msgDiv.appendChild(timeEl);
  chatMessages.appendChild(msgDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  // 保存 stdout 供下一轮绘图注入路径
  if (d.stdout) lastCodeStdout = d.stdout;

  // 记录到 chatHistory（简洁摘要，供后续 RAG 上下文使用）
  const summary = (d.skill_used ? `[技能:${d.skill_used}] ` : '') +
    (d.success ? '执行成功' : '执行失败') +
    (cleanOut ? '\n输出:\n' + cleanOut.slice(0, 300) : '');
  chatHistory.push({role:'assistant', content: summary});

  // 标记此轮为代码模式，以便后续"改进/调整"指令自动路由到 code
  lastIntentWasCode = true;

  // 执行成功后，在气泡下方显示"继续改进"提示卡
  if (d.success) {
    const hintWrap = document.createElement('div');
    hintWrap.className = 'msg msg-assistant improve-hint-row';
    hintWrap.style.cssText = 'margin-top:-.4rem;margin-bottom:.75rem;';

    const hintCard = document.createElement('div');
    hintCard.style.cssText = 'display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;padding:.35rem .65rem;background:#f0f4ff;border:1px solid #c5cae9;border-radius:10px;font-size:.78rem;color:#3949ab;max-width:82%;';

    const hintLabel = document.createElement('span');
    hintLabel.style.cssText = 'opacity:.75;white-space:nowrap;';
    hintLabel.textContent = currentLang === 'zh' ? '💡 继续改进：' : '💡 Refine:';
    hintCard.appendChild(hintLabel);

    const suggestions = currentLang === 'zh'
      ? ['换个配色', '加上标题', '放大字体', '加网格线', '换底图分辨率']
      : ['Change colors', 'Add a title', 'Larger font', 'Add grid lines', 'Higher resolution'];

    suggestions.forEach(s => {
      const chip = document.createElement('button');
      chip.style.cssText = 'border:1px solid #9fa8da;background:#fff;color:#3949ab;border-radius:12px;padding:.1rem .6rem;font-size:.76rem;cursor:pointer;white-space:nowrap;';
      chip.textContent = s;
      chip.onclick = () => {
        document.getElementById('userInput').value = s;
        document.getElementById('userInput').focus();
        hintWrap.remove();
      };
      hintCard.appendChild(chip);
    });

    hintWrap.appendChild(hintCard);
    chatMessages.appendChild(hintWrap);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }
}

// ── Think mode toggle ──────────────────────────────────────────────────────
let thinkEnabled = localStorage.getItem('sage_think') === '1';

function toggleThink() {
  thinkEnabled = !thinkEnabled;
  localStorage.setItem('sage_think', thinkEnabled ? '1' : '0');
  _applyThinkPill();
}

function _applyThinkPill() {
  const pill  = document.getElementById('thinkPill');
  const label = document.getElementById('thinkPillLabel');
  if (!pill || !label) return;
  if (thinkEnabled) {
    pill.classList.add('active');
    label.innerHTML = `🧠 <span>${T('think_on')}</span>`;
  } else {
    pill.classList.remove('active');
    label.innerHTML = `🧠 <span>${T('think_off')}</span>`;
  }
}

document.addEventListener('DOMContentLoaded', _applyThinkPill);

// ── Think parser (state machine for <think>…</think> tags) ────────────────
class ThinkParser {
  constructor() {
    this._inThink   = false;
    this._buf       = '';       // partial-tag lookahead buffer
    this.thinkText   = '';
    this.contentText = '';
  }

  push(chunk) {
    this._buf += chunk;
    const OPEN  = '<think>';
    const CLOSE = '</think>';
    while (true) {
      if (!this._inThink) {
        const idx = this._buf.indexOf(OPEN);
        if (idx === -1) {
          const safe = this._buf.length - (OPEN.length - 1);
          if (safe > 0) { this.contentText += this._buf.slice(0, safe); this._buf = this._buf.slice(safe); }
          break;
        }
        this.contentText += this._buf.slice(0, idx);
        this._buf   = this._buf.slice(idx + OPEN.length);
        this._inThink = true;
      } else {
        const idx = this._buf.indexOf(CLOSE);
        if (idx === -1) {
          const safe = this._buf.length - (CLOSE.length - 1);
          if (safe > 0) { this.thinkText += this._buf.slice(0, safe); this._buf = this._buf.slice(safe); }
          break;
        }
        this.thinkText += this._buf.slice(0, idx);
        this._buf   = this._buf.slice(idx + CLOSE.length);
        this._inThink = false;
      }
    }
  }

  flush() {
    if (this._inThink) this.thinkText   += this._buf;
    else               this.contentText += this._buf;
    this._buf = '';
  }
}

// ── Streaming response renderer ────────────────────────────────────────────
// Creates a live assistant bubble and streams text/think chunks into it.
// Returns a Promise that resolves to {answer, sources} when streaming completes.
function createStreamingBubble() {
  const welcome = document.getElementById('welcomePanel');
  if (welcome) welcome.remove();

  const msgDiv  = document.createElement('div');
  msgDiv.className = 'msg msg-assistant';

  const bubble  = document.createElement('div');
  bubble.className = 'bubble';

  // Think block (hidden until we get <think> content)
  const thinkBlock = document.createElement('div');
  thinkBlock.className = 'think-block';
  thinkBlock.style.display = 'none';

  const thinkHeader = document.createElement('div');
  thinkHeader.className = 'think-header';
  thinkHeader.innerHTML = `<i class="think-toggle-icon">▶</i> <span>${T('think_label') || '思考过程'}</span>`;
  thinkHeader.onclick = () => thinkBlock.classList.toggle('open');

  const thinkBody = document.createElement('div');
  thinkBody.className = 'think-body';
  thinkBlock.appendChild(thinkHeader);
  thinkBlock.appendChild(thinkBody);

  // Content area
  const contentDiv = document.createElement('div');

  bubble.appendChild(thinkBlock);
  bubble.appendChild(contentDiv);

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});

  msgDiv.appendChild(bubble);
  msgDiv.appendChild(timeEl);
  chatMessages.appendChild(msgDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  // Cursors
  const thinkCursor   = document.createElement('span');
  thinkCursor.className = 'think-cursor';
  const contentCursor = document.createElement('span');
  contentCursor.className = 'think-cursor';

  let lastThinkLen = 0;
  let lastContentLen = 0;
  let prevContentMd = '';

  return {
    msgDiv,
    hideThink() { thinkBlock.style.display = 'none'; thinkBlock.classList.remove('open'); },
    updateThink(text) {
      if (text.length === lastThinkLen) return;
      lastThinkLen = text.length;
      // Show block, default open while streaming
      if (thinkBlock.style.display === 'none') {
        thinkBlock.style.display = '';
        thinkBlock.classList.add('open');
      }
      thinkBody.textContent = text;
      thinkBody.appendChild(thinkCursor);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    },
    updateContent(text) {
      if (text === prevContentMd) return;
      prevContentMd = text;
      if (!text.trim()) {
        // Nothing outside <think> yet — show faint hint so user sees progress
        contentDiv.innerHTML =
          '<span style="color:#bbb;font-style:italic;font-size:.85rem">' +
          (currentLang === 'zh' ? '正在推理，结果即将显示…' : 'Reasoning, answer coming…') +
          '</span>';
      } else {
        contentDiv.innerHTML = formatText(text);
        contentDiv.appendChild(contentCursor);
      }
      chatMessages.scrollTop = chatMessages.scrollHeight;
    },
    finalise(text, sources) {
      thinkCursor.remove();
      contentCursor.remove();
      // Collapse think block after streaming
      thinkBlock.classList.remove('open');
      contentDiv.innerHTML = formatText(text) + _renderSourceChips(sources);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    },
  };
}

async function streamToMsg(url, body) {
  const streamer = createStreamingBubble();
  const parser   = new ThinkParser();
  let   sources  = [];
  let   errored  = false;

  try {
    const resp = await fetch(url, {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify(body),
    });

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let   buffer  = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});

      const lines = buffer.split('\n');
      buffer = lines.pop();   // keep incomplete tail

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') break;
        try {
          const obj = JSON.parse(payload);
          if (obj.type === 'sources') {
            sources = obj.sources || [];
          } else if (obj.type === 'chunk') {
            parser.push(obj.text || '');
            streamer.updateThink(parser.thinkText);
            streamer.updateContent(parser.contentText);
          } else if (obj.type === 'error') {
            errored = true;
            parser.push(`\n✗ 错误：${obj.message}`);
            streamer.updateContent(parser.contentText);
          }
        } catch(e) { /* ignore malformed SSE line */ }
      }
    }
  } catch(e) {
    parser.push(`\n✗ 请求失败：${e.message}`);
    streamer.updateContent(parser.contentText);
    errored = true;
  }

  parser.flush();

  // Guard: some models emit the entire reply inside <think>…</think> with nothing
  // outside (especially when think mode is on but the model ignores the instruction).
  // In that case promote thinkText → contentText so the user sees the answer.
  if (!parser.contentText.trim() && parser.thinkText.trim()) {
    parser.contentText = parser.thinkText;
    parser.thinkText   = '';
    // Hide the (now-empty) think block
    streamer.hideThink && streamer.hideThink();
  }

  streamer.finalise(parser.contentText, sources);

  const answer = parser.contentText;
  return {answer, sources, errored};
}

async function sendRag(text) {
  // 自动判断是否为文献解读请求
  const paperKeywords = ['总结', '解读', '摘要', '结论', '方法', '论文', '文献', '这篇', '本文', '作者'];
  const isPaperMode = paperKeywords.some(k => text.includes(k)) && sessionDocs.length > 0;
  const mode = isPaperMode ? 'paper_read' : 'rag';

  hideTyping();

  const {answer, sources} = await streamToMsg('/api/chat/rag/stream', {
    message:      text,
    session_id:   SESSION_ID,
    mode,
    history:      chatHistory.slice(-8),
    workspace:    wsEnabled ? wsPath : '',
    enable_think: thinkEnabled,
  });

  chatHistory.push({role:'assistant', content: answer || '（无回复）'});

  // 论文解读模式：标记状态，并显示"复现方法"提示卡
  if (isPaperMode) {
    lastIntentWasPaper = true;
    lastIntentWasCode  = false;

    const hintWrap = document.createElement('div');
    hintWrap.className = 'msg msg-assistant improve-hint-row';
    hintWrap.style.cssText = 'margin-top:-.4rem;margin-bottom:.75rem;';

    const hintCard = document.createElement('div');
    hintCard.style.cssText = 'display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;padding:.35rem .65rem;background:#fff8e1;border:1px solid #ffe082;border-radius:10px;font-size:.78rem;color:#e65100;max-width:82%;';

    const hintLabel = document.createElement('span');
    hintLabel.style.cssText = 'opacity:.75;white-space:nowrap;';
    hintLabel.textContent = currentLang === 'zh' ? '🔗 串联编程 Agent：' : '🔗 Chain to Code:';
    hintCard.appendChild(hintLabel);

    const chips = currentLang === 'zh'
      ? ['帮我复现这个方法', '用Python实现上述算法', '写出完整实现代码', '实现这个流程']
      : ['Reproduce this method', 'Implement in Python', 'Full implementation', 'Code this workflow'];

    chips.forEach(s => {
      const chip = document.createElement('button');
      chip.style.cssText = 'border:1px solid #ffcc02;background:#fff;color:#e65100;border-radius:12px;padding:.1rem .6rem;font-size:.76rem;cursor:pointer;white-space:nowrap;';
      chip.textContent = s;
      chip.onclick = () => {
        document.getElementById('userInput').value = s;
        document.getElementById('userInput').focus();
        hintWrap.remove();
      };
      hintCard.appendChild(chip);
    });

    hintWrap.appendChild(hintCard);
    chatMessages.appendChild(hintWrap);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  } else {
    lastIntentWasPaper = false;
  }
}

// ── 串联模式：论文解读 → 编程 Agent ────────────────────────────────────────
async function sendChainRagCode(originalText) {
  lastIntentWasCode  = false;
  lastIntentWasPaper = false;

  // ── Phase 1：RAG — 提取论文方法 (streaming) ──────────────────────────────
  showTyping(currentLang === 'zh' ? '📄 提取论文方法…' : '📄 Extracting paper methods…');

  let ragAnswer  = '';
  let ragSources = [];
  try {
    hideTyping();
    const {answer: _ra, sources: _rs} = await streamToMsg('/api/chat/rag/stream', {
      message:      originalText,
      session_id:   SESSION_ID,
      mode:         'paper_read',
      history:      chatHistory.slice(-8),
      workspace:    wsEnabled ? wsPath : '',
      enable_think: thinkEnabled,
    });
    ragAnswer  = _ra || '';
    ragSources = _rs || [];
  } catch(e) {
    // RAG 失败不致命，直接用原始文本去 code
  }

  // 在最后一个 assistant 气泡顶部插入阶段标签
  if (ragAnswer) {
    const lastMsg = chatMessages.querySelector('.msg-assistant:last-of-type');
    if (lastMsg) {
      const badge1 = document.createElement('div');
      badge1.style.cssText = 'display:inline-block;font-size:.72rem;padding:.08rem .5rem;background:#fff8e1;border:1px solid #ffe082;border-radius:10px;color:#e65100;margin-bottom:.45rem;';
      badge1.textContent = currentLang === 'zh' ? '📄 步骤 1 — 论文方法解读' : '📄 Step 1 — Paper Analysis';
      const bbl = lastMsg.querySelector('.bubble');
      if (bbl) bbl.prepend(badge1);
    }
    chatHistory.push({role:'assistant', content: ragAnswer});
  }

  // ── 连接指示器 ────────────────────────────────────────────────────────────
  const connectorRow = document.createElement('div');
  connectorRow.className = 'msg msg-assistant';
  connectorRow.style.cssText = 'margin-bottom:.4rem;';
  const connectorEl = document.createElement('div');
  connectorEl.style.cssText = 'font-size:.75rem;color:#888;padding:.2rem .5rem;display:flex;align-items:center;gap:.35rem;';
  connectorEl.innerHTML = `<span style="display:inline-block;width:1px;height:16px;background:#ddd;margin:0 2px"></span>⚙ ${currentLang==='zh' ? '将方法传递给编程 Agent…' : 'Passing methods to Code Agent…'}`;
  connectorRow.appendChild(connectorEl);
  chatMessages.appendChild(connectorRow);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  // ── Phase 2：Code — 生成实现代码 ─────────────────────────────────────────
  showTyping(currentLang === 'zh' ? '⚙ 生成复现代码…' : '⚙ Generating implementation…');

  // 构造富含论文方法上下文的 code prompt
  let enrichedPrompt;
  if (ragAnswer) {
    enrichedPrompt =
      `请根据以下论文方法的解读，用 Python 实现完整代码。\n\n` +
      `【论文方法解读】\n${ragAnswer.slice(0, 2000)}\n\n` +
      `【用户需求】${originalText}`;
  } else {
    enrichedPrompt = originalText;
  }

  // 在 code 气泡上添加 Phase 2 标签（通过 enrichedPrompt 中的 hint 传递）
  // 将阶段信息作为注释注入，让 code_engine 的历史看得到上下文
  await sendCode(enrichedPrompt, /*phase2Badge=*/true);

  // 完成后移除连接器
  connectorRow.remove();
}

  chatMessages.innerHTML = `<div class="welcome" id="welcomePanel">
    <h3><i class="bi bi-robot"></i> SeismicX AI 助手</h3>

  </div>`;
  contextBar.style.display = 'none';

  lastDataPath       = '';    // 清空数据目录缓存
  lastIntentWasCode  = false; // 清空改进模式标记
  lastIntentWasPaper = false; // 清空论文串联模式标记

  fetch('/api/chat/code/reset', {

}

// ── Waveform (keep existing Plotly logic) ──────────────────────────────────
const PHASE_COLORS = {Pg:'#e74c3c',Sg:'#3498db',Pn:'#c0392b',Sn:'#2980b9',P:'#e67e22',S:'#1abc9c'};

function renderWaveform(container, traces, title, picks=[]) {
  const plotDiv = document.createElement('div');
  plotDiv.style.cssText = 'width:100%;margin-top:10px;border-radius:8px;overflow:hidden;';
  const h = Math.max(200, traces.length*130);
  plotDiv.style.height = h + 'px';
  container.appendChild(plotDiv);

  const plotlyTraces = traces.map((tr,i) => ({
    x:tr.times, y:tr.amplitudes, type:'scatter', mode:'lines', name:tr.label,
    line:{width:1}, xaxis:i===0?'x':`x${i+1}`, yaxis:i===0?'y':`y${i+1}`,
  }));
  const layout = {title:{text:title,font:{size:13}}, margin:{t:40,b:40,l:70,r:20},
    height:h, showlegend:false, paper_bgcolor:'#fff', plot_bgcolor:'#fafafa',
    grid:{rows:traces.length,columns:1,pattern:'independent',roworder:'top to bottom'},
    shapes:[], annotations:[]};
  traces.forEach((tr,i) => {
    const ax = i===0?'':''+( i+1);
    layout[`xaxis${ax}`] = {title:i===traces.length-1?'Time (s)':'',showticklabels:i===traces.length-1,gridcolor:'#e0e0e0'};
    layout[`yaxis${ax}`] = {title:tr.label,tickvals:[-1,0,1],ticktext:['-1','0','1'],gridcolor:'#e0e0e0',zeroline:true,zerolinecolor:'#aaa',zerolinewidth:1};
  });
  if (picks?.length) {
    picks.forEach(pick => {
      const color = PHASE_COLORS[pick.phase]||'#999';
      traces.forEach((_,i) => {
        const xr = i===0?'x':`x${i+1}`, yr = i===0?'y':`y${i+1}`;
        layout.shapes.push({type:'line',xref:xr,yref:yr,x0:pick.time_s,x1:pick.time_s,y0:-1.1,y1:1.1,line:{color,width:1.5,dash:'dot'}});
      });
      layout.annotations.push({x:pick.time_s,y:1.05,xref:'x',yref:'y',
        text:`<b>${pick.phase}</b><br>${pick.confidence.toFixed(2)}`,showarrow:true,arrowhead:2,
        arrowsize:.8,ax:0,ay:-20,font:{size:10,color},arrowcolor:color,
        bgcolor:'rgba(255,255,255,0.8)',bordercolor:color,borderwidth:1,borderpad:2});
    });
  }
  Plotly.newPlot(plotDiv, plotlyTraces, layout, {responsive:true});
  setTimeout(()=>{chatMessages.scrollTop=chatMessages.scrollHeight;},300);
}

function pollPickTask(taskId, msgEl, waveformData, title, interval=3000) {
  const bubble = msgEl.querySelector('.bubble');
  const spinner = document.createElement('div');
  spinner.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span> 拾取中…';
  spinner.style.cssText='margin-top:8px;color:var(--accent);font-size:.82rem;';
  bubble.appendChild(spinner);
  const timer = setInterval(async()=>{
    const r = await fetch(`/api/chat_picks/${taskId}`);
    const d = await r.json();
    if (d.status==='running') return;
    clearInterval(timer); spinner.remove();
    if (d.status==='completed') {
      const old = msgEl.querySelector('.js-plotly-plot');
      if (old) old.remove();
      renderWaveform(msgEl, waveformData, title.replace('拾取中…','震相拾取结果'), d.picks||[]);
      const sum = document.createElement('div');
      sum.style.cssText='margin-top:6px;font-size:.82rem;color:#555;';
      sum.innerHTML = d.picks?.length ? `✓ 检测到 <b>${d.picks.length}</b> 个震相` : '⚠️ 未检测到震相';
      bubble.appendChild(sum);
    }
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }, interval);
}

function pollBatchTask(taskId, msgEl, picksFile, interval=3000) {
  const bubble = msgEl.querySelector('.bubble');
  const bar = document.createElement('div');
  bar.innerHTML = `
    <div style="background:#f0f0f0;border-radius:4px;height:8px;overflow:hidden;margin-top:10px">
      <div id="bar-${taskId}" style="height:100%;width:5%;background:var(--grad);border-radius:4px;transition:width .5s"></div>
    </div>
    <div id="lab-${taskId}" style="font-size:.78rem;color:#666;margin-top:4px">初始化中…</div>`;
  bubble.appendChild(bar);
  const timer = setInterval(async()=>{
    const r = await fetch(`/api/task/${taskId}`);
    const d = await r.json();
    const prog = d.progress||{};
    const barEl = document.getElementById(`bar-${taskId}`);
    const labEl = document.getElementById(`lab-${taskId}`);
    if (d.status==='running') {
      const pct = prog.total>0 ? Math.max(5,Math.round(prog.current/prog.total*100)) : 10;
      if (barEl) barEl.style.width=pct+'%';
      if (labEl) labEl.textContent=`${prog.current||0}/${prog.total||'?'} 台站 | ${prog.n_picks||0} 震相`;
      return;
    }
    clearInterval(timer); bar.remove();
    const sum = document.createElement('div');
    sum.style.cssText='margin-top:8px;font-size:.82rem;';
    if (d.status==='completed') {
      const re = d.result||{};
      sum.innerHTML=`✅ 完成：${re.n_stations||'?'} 台站，${re.n_picks||'?'} 个震相`;
    } else {
      sum.innerHTML=`❌ 失败：${d.stderr?.slice(-200)||d.status}`;
    }
    bubble.appendChild(sum);
    chatMessages.scrollTop=chatMessages.scrollHeight;
  }, interval);
}
