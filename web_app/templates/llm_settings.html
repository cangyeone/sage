<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM 设置 — SeismicX</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<style>
:root { --accent: #667eea; --accent2: #764ba2; }
body { background: #f5f7fa; min-height: 100vh; }
.navbar { background: #fff !important; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
.navbar-brand span { background: linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.page-header { background: linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; padding: 2rem 0 1.5rem; }

.provider-card {
  border: 2px solid #e0e0e0; border-radius: 12px;
  padding: 1rem 1.25rem; margin-bottom: .75rem;
  cursor: pointer; transition: all .2s;
}
.provider-card:hover { border-color: var(--accent); background: #f8f9ff; }
.provider-card.selected { border-color: var(--accent); background: #eef0ff; }

.model-list { max-height: 280px; overflow-y: auto; }

.btn-save {
  background: linear-gradient(135deg,var(--accent),var(--accent2));
  color: #fff; border: none; padding: .6rem 2rem;
  border-radius: 20px; font-weight: 600;
}
.btn-save:hover { opacity: .9; color: #fff; }

.current-model-badge {
  display: inline-block; background: #e8f5e9; color: #2e7d32;
  border-radius: 20px; padding: .25rem .85rem; font-size: .85rem; font-weight: 600;
}
</style>
</head>
<body>
<!-- Nav -->
<nav class="navbar navbar-expand-lg navbar-light">
  <div class="container">
    <a class="navbar-brand" href="/chat">
      <i class="bi bi-activity text-primary"></i>
      <span><strong>SeismicX</strong></span>
    </a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="/chat"><i class="bi bi-chat-dots"></i> 对话</a></li>
        <li class="nav-item"><a class="nav-link" href="/knowledge"><i class="bi bi-journal-bookmark-fill"></i> 知识库</a></li>
        <li class="nav-item"><a class="nav-link active fw-bold" href="/llm-settings"><i class="bi bi-cpu"></i> LLM</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Header -->
<div class="page-header">
  <div class="container">
    <h4 class="mb-1"><i class="bi bi-cpu me-2"></i>LLM 模型设置</h4>
    <p class="mb-0 opacity-75" style="font-size:.9rem">配置 AI 后端，对话、RAG 问答均使用此设置</p>
  </div>
</div>

<div class="container mt-4" style="max-width:760px">

  <!-- 当前状态 -->
  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body py-3 d-flex align-items-center justify-content-between">
      <div>
        <span class="fw-bold text-muted me-2">当前模型：</span>
        <span id="currentModelBadge" class="current-model-badge">读取中…</span>
      </div>
      <button class="btn btn-sm btn-outline-secondary" onclick="testConnection()">
        <i class="bi bi-plug"></i> 测试连接
      </button>
    </div>
  </div>

  <!-- 设置表单 -->
  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body p-4">
      <form id="llmForm">

        <!-- Provider -->
        <div class="mb-4">
          <label class="form-label fw-bold">选择后端</label>
          <div class="provider-card selected" data-provider="ollama" onclick="selectProvider(this)">
            <div class="d-flex align-items-center gap-2">
              <i class="bi bi-hdd-network text-primary fs-5"></i>
              <div>
                <div class="fw-bold">Ollama（本地）</div>
                <div class="text-muted" style="font-size:.85rem">本地运行，保护隐私，支持离线使用</div>
              </div>
              <span id="ollamaStatus" class="ms-auto"></span>
            </div>
          </div>
          <div class="provider-card" data-provider="openai" onclick="selectProvider(this)">
            <div class="d-flex align-items-center gap-2">
              <i class="bi bi-cloud text-info fs-5"></i>
              <div>
                <div class="fw-bold">OpenAI</div>
                <div class="text-muted" style="font-size:.85rem">GPT-4o / GPT-4o-mini，需要 API Key</div>
              </div>
            </div>
          </div>
          <div class="provider-card" data-provider="custom" onclick="selectProvider(this)">
            <div class="d-flex align-items-center gap-2">
              <i class="bi bi-gear text-secondary fs-5"></i>
              <div>
                <div class="fw-bold">自定义 API（兼容 OpenAI 格式）</div>
                <div class="text-muted" style="font-size:.85rem">DeepSeek / SiliconFlow / 本地 vLLM 等</div>
              </div>
            </div>
          </div>
          <input type="hidden" id="provider" value="ollama">
        </div>

        <!-- Ollama 模型列表 -->
        <div id="ollamaSection">
          <label class="form-label fw-bold">选择 Ollama 模型</label>
          <div id="ollamaModelsLoading" class="text-center py-3">
            <div class="spinner-border spinner-border-sm text-primary"></div>
            <span class="ms-2 text-muted">正在读取已安装模型…</span>
          </div>
          <div id="ollamaModelsList" class="model-list mb-3" style="display:none"></div>
          <input type="text" class="form-control" id="ollamaCustomModel"
                 placeholder="或手动输入模型名称，如 qwen3:30b">
        </div>

        <!-- 在线 API 设置 -->
        <div id="onlineSection" style="display:none">
          <div class="mb-3">
            <label class="form-label fw-bold">API Base URL</label>
            <input type="text" class="form-control" id="apiBase"
                   placeholder="https://api.openai.com/v1">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">API Key</label>
            <input type="password" class="form-control" id="apiKey"
                   placeholder="sk-…">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">模型名称</label>
            <input type="text" class="form-control" id="onlineModel"
                   placeholder="gpt-4o / deepseek-chat / …">
          </div>
        </div>

        <!-- 保存 -->
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-save">
            <i class="bi bi-check-circle me-1"></i>保存配置
          </button>
          <button type="button" class="btn btn-outline-secondary" onclick="loadConfig()">
            <i class="bi bi-arrow-clockwise me-1"></i>刷新
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="toast" class="toast align-items-center text-bg-success border-0">
      <div class="d-flex">
        <div class="toast-body" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentConfig = null;

document.addEventListener('DOMContentLoaded', loadConfig);

// ── Provider selection ────────────────────────────────────────────────────
function selectProvider(el) {
  document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  const p = el.dataset.provider;
  document.getElementById('provider').value = p;
  document.getElementById('ollamaSection').style.display  = p === 'ollama'  ? 'block' : 'none';
  document.getElementById('onlineSection').style.display  = p !== 'ollama'  ? 'block' : 'none';
}

// ── Load config ───────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const r = await fetch('/api/llm/config');
    const d = await r.json();
    currentConfig = d.config || {};

    const provider = currentConfig.provider || 'ollama';
    document.getElementById('provider').value = provider;
    const card = document.querySelector(`.provider-card[data-provider="${provider}"]`);
    if (card) { document.querySelectorAll('.provider-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); }
    selectProvider(card || document.querySelector('.provider-card'));

    if (provider === 'ollama') {
      document.getElementById('ollamaCustomModel').value = currentConfig.model || '';
      loadOllamaModels();
    } else {
      document.getElementById('apiBase').value    = currentConfig.api_base || '';
      document.getElementById('onlineModel').value = currentConfig.model   || '';
    }

    updateOllamaStatus(d.ollama_available);
    updateCurrentBadge();
  } catch(e) {
    showToast('读取配置失败: ' + e.message, 'danger');
  }
}

function updateCurrentBadge() {
  const badge = document.getElementById('currentModelBadge');
  if (!currentConfig || !currentConfig.model) {
    badge.textContent = '未配置';
    badge.style.background = '#fce4e4'; badge.style.color = '#c62828';
  } else {
    badge.textContent = `${currentConfig.provider === 'ollama' ? 'Ollama' : currentConfig.provider} · ${currentConfig.model}`;
    badge.style.background = '#e8f5e9'; badge.style.color = '#2e7d32';
  }
}

// ── Load Ollama models ────────────────────────────────────────────────────
async function loadOllamaModels() {
  try {
    const r = await fetch('/api/llm/ollama/models');
    const d = await r.json();

    document.getElementById('ollamaModelsLoading').style.display = 'none';
    const list = document.getElementById('ollamaModelsList');
    list.style.display = 'block';

    if (!d.ollama_available) {
      list.innerHTML = `<div class="alert alert-warning py-2">
        <i class="bi bi-exclamation-triangle"></i>
        Ollama 未启动，请运行 <code>ollama serve</code> 后刷新
      </div>`;
      return;
    }

    if (!d.installed || d.installed.length === 0) {
      list.innerHTML = `<div class="text-muted">暂无已安装模型，请先用 <code>ollama pull &lt;模型名&gt;</code> 安装</div>`;
      return;
    }

    const savedModel = currentConfig?.model || '';
    list.innerHTML = '<div class="fw-semibold mb-2" style="font-size:.85rem">已安装模型</div>' +
      d.installed.map(m => `
        <div class="form-check mb-1">
          <input class="form-check-input" type="radio" name="ollamaModel"
                 id="m_${m}" value="${m}" ${m === savedModel ? 'checked' : ''}
                 onchange="document.getElementById('ollamaCustomModel').value=''">
          <label class="form-check-label" for="m_${m}">${m}</label>
        </div>`).join('');

  } catch(e) {
    document.getElementById('ollamaModelsLoading').innerHTML =
      '<p class="text-danger">读取模型失败</p>';
  }
}

function updateOllamaStatus(available) {
  const el = document.getElementById('ollamaStatus');
  el.innerHTML = available
    ? '<span class="badge bg-success">● 运行中</span>'
    : '<span class="badge bg-secondary">● 未启动</span>';
}

// ── Save ─────────────────────────────────────────────────────────────────
document.getElementById('llmForm').addEventListener('submit', async e => {
  e.preventDefault();
  const provider = document.getElementById('provider').value;
  const payload  = { provider };

  if (provider === 'ollama') {
    const radio  = document.querySelector('input[name="ollamaModel"]:checked');
    const custom = document.getElementById('ollamaCustomModel').value.trim();
    const model  = custom || (radio ? radio.value : '');
    if (!model) { showToast('请选择或输入一个模型名称', 'warning'); return; }
    payload.model    = model;
    payload.api_base = 'http://localhost:11434';
  } else {
    payload.api_base = document.getElementById('apiBase').value.trim();
    payload.model    = document.getElementById('onlineModel').value.trim();
    const key = document.getElementById('apiKey').value.trim();
    if (key) payload.api_key = key;
    if (!payload.api_base || !payload.model) {
      showToast('请填写 API URL 和模型名称', 'warning'); return;
    }
  }

  try {
    const r = await fetch('/api/llm/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (r.ok) {
      currentConfig = { ...currentConfig, ...payload };
      updateCurrentBadge();
      showToast('✓ 配置已保存', 'success');
    } else {
      showToast('保存失败: ' + d.error, 'danger');
    }
  } catch(e) {
    showToast('保存失败: ' + e.message, 'danger');
  }
});

// ── Test connection ───────────────────────────────────────────────────────
async function testConnection() {
  showToast('正在测试连接…', 'info');
  try {
    const r = await fetch('/api/llm/config');
    const d = await r.json();
    const cfg = d.config || {};
    if (!cfg.model || !cfg.api_base) {
      showToast('请先保存配置再测试', 'warning'); return;
    }
    // Send a tiny chat message
    const resp = await fetch('/api/chat/rag', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: 'hello', session_id: 'llm_test', mode: 'rag' })
    });
    const data = await resp.json();
    if (data.ok && data.response) {
      showToast('✓ 连接正常，模型响应成功', 'success');
    } else {
      showToast('模型无响应，请检查配置', 'warning');
    }
  } catch(e) {
    showToast('连接失败: ' + e.message, 'danger');
  }
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = `toast align-items-center text-bg-${type} border-0`;
  new bootstrap.Toast(t, {delay: 3000}).show();
}
</script>
</body>
</html>
